<text x="468" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Data Preparation</text>
<text x="468" y="142" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ml_prepare_data/samplers/*, ml</text>
<text x="468" y="158" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">_prepare_data/labelling/trippl</text>
<text x="468" y="174" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">e_bar.py...</text>
</g>
<g id="feature_engineering">
<rect x="655" y="130" width="180" height="110" rx="18" fill="#7c3aed" stroke="#0f172a" stroke-width="1.4"/>
<text x="673" y="158" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Feature Engineering</text>
<text x="673" y="182" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ml_prepare_data/features/featu</text>
<text x="673" y="198" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">re_engineering.py</text>
</g>
<g id="ml_models">
<rect x="860" y="90" width="180" height="110" rx="18" fill="#b45309" stroke="#0f172a" stroke-width="1.4"/>
<text x="878" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">ML Models</text>
<text x="878" y="142" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ml_framework/models/conv1d.py</text>
</g>
<g id="training_evaluation">
<rect x="1065" y="130" width="180" height="110" rx="18" fill="#dc2626" stroke="#0f172a" stroke-width="1.4"/>
<text x="1083" y="158" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Training / Evaluation</text>
<text x="1083" y="182" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ml_framework/train/*</text>
</g>
<g id="logging">
<rect x="1270" y="90" width="180" height="110" rx="18" fill="#15803d" stroke="#0f172a" stroke-width="1.4"/>
<text x="1288" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Logging / Monitoring</text>
<text x="1288" y="142" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ml_framework/logging/wandb_log</text>
<text x="1288" y="158" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">ger.py</text>
</g>
</svg>
