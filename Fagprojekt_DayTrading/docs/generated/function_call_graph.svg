<text x="1818" y="158" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">classification_metrics</text>
<text x="1818" y="182" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e2e8f0">Accuracy summary</text>
</g>
<g id="profit">
