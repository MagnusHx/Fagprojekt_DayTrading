<svg xmlns="http://www.w3.org/2000/svg" width="2250" height="278" viewBox="0 0 2250 278" role="img" aria-label="Focused Training Function Call Graph">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="36" y="40" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Focused Training Function Call Graph</text>
<path d="M230,134 C245,134 245,134 260,134" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M230,134 C355,134 355,134 480,134" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M230,134 C465,134 465,134 700,134" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M230,134 C575,134 575,94 920,94" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M1110,94 C1125,94 1125,54 1140,54" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<text x="1125" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#334155">every epoch</text>
<path d="M1110,94 C1125,94 1125,174 1140,174" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<text x="1125" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#334155">light eval</text>
<path d="M1110,94 C1235,94 1235,94 1360,94" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<text x="1235" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#334155">full eval</text>
<path d="M1550,94 C1565,94 1565,94 1580,94" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<text x="1565" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#334155">for each split</text>
<path d="M1770,94 C1785,94 1785,54 1800,54" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M1770,94 C1785,94 1785,174 1800,174" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<path d="M1770,94 C1895,94 1895,114 2020,114" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
